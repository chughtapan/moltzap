services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: moltzap-conformance-toxiproxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8474:8474" # HTTP control plane
      - "127.0.0.1:10000-10100:10000-10100" # Dynamic proxy ports
    command: ["-host", "0.0.0.0", "-port", "8474"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8474/version"]
      interval: 2s
      timeout: 1s
      retries: 15
