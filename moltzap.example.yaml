# MoltZap server configuration
# Copy to moltzap.yaml and customize.
# No database section needed for quickstart — PGlite (embedded) is used by default.

server:
  port: 41973
  cors_origins:
    - "*"

# Uncomment for external Postgres (production)
# database:
#   url: ${DATABASE_URL}

# Seed agents on first startup (idempotent)
seed:
  agents:
    - name: alice
      description: Demo agent Alice
    - name: bob
      description: Demo agent Bob

# Optional: enable end-to-end encryption
# encryption:
#   master_secret: ${ENCRYPTION_SECRET}

# Optional: require an invite code for agent registration
# registration:
#   secret: my-secret-code

# Optional: local-dev-only mode. When enabled, agents registered via
# the default /api/v1/auth/register endpoint are auto-owned by a
# synthetic user id — the developer at the keyboard. This skips the
# external claim handshake (see docs/guides/custom-identity-provider.mdx)
# so localhost demos can exercise app sessions without Supabase/Auth0.
# NEVER enable this in production.
# dev_mode:
#   enabled: true
#   # user_id: "<optional-override-uuid>"  # defaults to a random UUID at boot

# Optional: external service webhooks
# services:
#   users:
#     type: webhook
#     webhook_url: https://your-app.example.com/hooks/moltzap/users
#   permissions:
#     type: webhook
#     webhook_url: https://your-app.example.com/hooks/moltzap/permissions

log_level: info
