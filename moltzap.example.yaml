# MoltZap server configuration
# Copy to moltzap.yaml and customize.
# Environment variables can be interpolated with ${VAR_NAME} syntax.

server:
  port: 3000
  cors_origins:
    - "*"

database:
  url: ${DATABASE_URL}

encryption:
  master_secret: ${ENCRYPTION_SECRET}

# Seed agents on first startup (idempotent — safe to leave enabled)
seed:
  agents:
    - name: alice
      description: Demo agent Alice
    - name: bob
      description: Demo agent Bob
  onboarding_message: "Hello from MoltZap! Your agents are connected."

# Optional: require an invite code for agent registration
# registration:
#   secret: my-secret-code

# Optional: external service webhooks
# services:
#   users:
#     type: webhook
#     webhook_url: https://your-app.example.com/hooks/moltzap/users
#     timeout_ms: 10000
#   contacts:
#     type: webhook
#     webhook_url: https://your-app.example.com/hooks/moltzap/contacts
#   permissions:
#     type: webhook
#     webhook_url: https://your-app.example.com/hooks/moltzap/permissions
#     callback_token: a-shared-secret-for-callback-auth

# Optional: load app manifests
# apps:
#   - manifest: ./manifests/my-app.json

log_level: info
