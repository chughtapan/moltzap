scenarioId: EVAL-031
result: passed
agentResponse: >-
  Start with a market-based offer you can justify, not a guess about the
  seller’s floor.


  A reasonable buyer approach:

  - open below your target, but not insultingly low

  - tie it to scope, deliverables, and comparable rates

  - leave room to move


  If you want a concrete opener and you don’t have better market data, I’d start
  around **15–25% below what you’d be happy paying** and negotiate from there.


  If you give me the role/scope and your budget range, I can suggest a sharper
  number.
